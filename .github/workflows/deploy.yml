name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t trevorvaughandev/devops-app:${{ github.sha }} .

      - name: Push image
        run: 
          docker push trevorvaughandev/devops-app:${{ github.sha }} .

      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            sudo docker pull trevorvaughandev/devops-app:${{ github.sha }} .
            sudo docker rm -f $(sudo docker ps -aq)
            sudo docker run -d -p 5000:5000 --restart unless-stopped trevorvaughandev/devops-app:${{ github.sha }} .
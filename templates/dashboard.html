<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Monitoring Platform</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    .bar {
        width:100%;
        height: 8px;
        background: #1e293b;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 5px;
    }

    .fill {
        height: 100%;
        background: #3b82f6;
        width: 0%;
        transition: width 0.5s ease, box-shadow 0.5s ease;

    }

    /* Colors */
    .cpu-fill {
        background: linear-gradient(90deg, #22c55e, #3b82f6);
    }

    .memory-fill {
        background: linear-gradient(90deg, #3b82f6, #9333ea);
    }

    .disk-fill {
        background: linear-gradient(90deg, #f59e0b, #ef4444);
    }

    /* Glow effect */
    .fill.glow {
        box-shadow: 0 0 10px currentColor, 0 0 20px currentColor;       
    }

* { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: 'Inter', sans-serif;
background: #020617;
color: #e2e8f0;
display: flex;
}

/* SIDEBAR */
.sidebar {
width: 240px;
height: 100vh;
background: rgba(255,255,255,0.03);
backdrop-filter: blur(12px);
padding: 25px 15px;
border-right: 1px solid rgba(255,255,255,0.05);
}

.sidebar h2 { margin-bottom: 30px; }

.sidebar a {
display:block;
margin: 10px 0;
padding: 8px 10px;
transition: background 0.2s;
margin-bottom:10px;
border-radius:8px;
color:#94a3b8;
text-decoration:none;
}

.sidebar a:hover {
background: rgba(255,255,255,0.08);  ;
}

/* MAIN */
.main {
flex:1;
padding:25px;
}

.status {
margin-top:15px;
margin-bottom: 20px;
}

/* HEADER */
.header {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}


.logout {
background:#ef4444;
padding:8px 14px;
border-radius:8px;
color:white;
text-decoration:none;
}

/* GRID */
.grid {
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:25px;
margin-top:20px;
}

/* CARD */
.card {
background: linear-gradient(145deg, #0f172a, #020617);
padding: 20px;
border-radius: 15px;
border: 1px solid rgba(255,255,255,0.05);
position: relative;
overflow: hidden;
backdrop-filter: blur(10px);
transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card::before {
content: "";
position: absolute;
inset: 0;
border-radius: 16px;
padding: 1px;
background: linear-gradient(90deg, #22c55e, #3b82f6, #9333ea);
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite: xor;
mask-composite: exclude;
}

.card:hover {
transform: translateY(-5px);
box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* VALUE */
.value {
font-size:1.8rem;
margin-top:10px;
}

/* STATUS */
.status {
margin-top:10px;
font-weight:bold;
}

/* ALERTS */
.alerts {
margin-top:20px;
color:#f87171;
}

/* LOG PANEL */
.logs {
margin-top:20px;
max-height:200px;
overflow:auto;
font-family: monospace;
font-size:0.85rem;
background:#020617;
padding:10px;
border-radius:10px;
}

/* SERVER CARD */
.server {
margin-top:20px;
display:grid;
grid-template-columns: repeat(2,1fr);
gap:20px;
}

/* PROGRESS BAR */
.bar {
height:8px;
background:#1e293b;
border-radius:5px;
overflow:hidden;
margin-top:5px;
}

.fill {
height:100%;
background:#3b82f6;
width:0%;
}

/* FOOTER */
.footer {
margin-top:30px;
text-align:center;
color:#64748b;
}

.live-dot {
display:inline-block;
width:10px;
height:10px;
background:#22c55e;
border-radius:50%;
margin-left:10px;
animation: pulse 2s infinite;
}

@keyframes pulse {
0% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.2); opacity: 0.7; }
100% { transform: scale(1); opacity: 1; }
}


</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🚀 Monitor</h2>
<a href="/">Dashboard</a>
<a href="/metrics">Metrics</a>
<a href="/servers">Servers</a>
<a href="/logs">Logs</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h1>DevOps Monitoring
    <span class="live-dot"></span> Live  
</h1>
<a href="/logout" class="logout">Logout</a>
</div>

<div style="margin-top: 20px; display:flex; gap:25px; align-items:center; flex-wrap:wrap;">
    <select id="serverSelect" style="background: rgba(255,255,255,0.04); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.05); padding: 8px; border-radius: 8px;">
        <option value="server1">Production</option>
        <option value="server2">Staging</option>
    </select>

    <h3 id="serverName">Server: Production</h3>
</div>

<div class="status">
Status: <span id="status">Checking...</span>
</div>

<!-- METRICS -->
<div class="grid">

<div class="card">
<h3>Visitors</h3>
<div class="value" id="visits">Loading...</div>
</div>


<div class="card">
<h3>CPU</h3>
<div class="value" id="cpuText">--%</div>
<div class="bar"><div id="cpuBar" class="fill cpu-fill"></div></div>
<canvas id="cpuChart"></canvas>
</div>

<div class="card">
<h3>Memory</h3>
<div class="value" id="memoryText">--%</div>
<div class="bar"><div id="memoryBar" class="fill memory-fill"></div></div>
<canvas id="memoryChart"></canvas>
</div>

<div class="card">
<h3>Disk</h3>
<div class="value" id="diskText">--%</div>
<div class="bar"><div id="diskBar" class="fill disk-fill"></div></div>
<canvas id="diskChart"></canvas>
</div>

</div>

<!-- SERVER INFO -->
<div class="server">

<div class="card">
<h3>Server Info</h3>
<p>Environment: Production</p>
<p>Region: EU-West</p>
<p>Version: v1.0</p>
</div>

<div class="card">
<h3>Alerts</h3>
<div id="alerts"></div>
</div>

</div>

<!-- LOGS -->
<div class="card logs" id="logs"></div>

<div class="footer">
DevOps Monitoring Platform • Live System
</div>

</div>

<script>
function setColor(id, value) {  
const el = document.getElementById(id);

if (value > 80) el.style.color = "#ef4444";
else if (value > 60) el.style.color = "#facc15";
else el.style.color = "#22c55e";
}

function animateValue(id, start, end, duration) {
    let startTimestamp = null;

function step(timestamp) {
if (!startTimestamp) startTimestamp = timestamp;

const progress = timestamp - startTimestamp;
const value = Math.floor(progress / duration * (end - start) + start);

document.getElementById(id).innerText = value + "%";
if (progress < duration) {
window.requestAnimationFrame(step);
} else {
document.getElementById(id).innerText = end + "%";
}
}

window.requestAnimationFrame(step);

}

function createChart(ctx, color) {
return new Chart(ctx, {
type: "line",
data: {
labels: [],
datasets: [{
data: [],
borderColor: color,
tension: 0.3
}]
},
options: {
plugins: { legend: { display: false }},
scales: {
x: { display: false },
y: { min: 0, max: 100 }
}
}
});
}

const cpuChart = createChart(document.getElementById("cpuChart"), "#22c55e");
const memoryChart = createChart(document.getElementById("memoryChart"), "#3b82f6");
const diskChart = createChart(document.getElementById("diskChart"), "#f59e0b");

function addLog(msg) {
const log = document.getElementById("logs");
const time = new Date().toLocaleTimeString();
log.innerHTML = `[${time}] ${msg}<br>` + log.innerHTML;
}

function updateUI(data) {

const cpuBar = document.getElementById("cpuBar");
cpuBar.style.width = data.cpu + "%";
cpuBar.classList.toggle("glow", data.cpu > 80);

const memoryBar = document.getElementById("memoryBar");
memoryBar.style.width = data.memory + "%";
memoryBar.classList.toggle("glow", data.memory > 80);

const diskBar = document.getElementById("diskBar");
diskBar.style.width = data.disk + "%";
diskBar.classList.toggle("glow", data.disk > 80);

document.getElementById("cpuText").innerText = data.cpu + "%";
document.getElementById("memoryText").innerText = data.memory + "%";
document.getElementById("diskText").innerText = data.disk + "%";

document.getElementById("cpuBar").style.width = data.cpu + "%";
document.getElementById("memoryBar").style.width = data.memory + "%";
document.getElementById("diskBar").style.width = data.disk + "%";

const status = document.getElementById("status");

if (data.cpu < 60) {
status.innerText = "Healthy";
status.style.color = "#22c55e";
} else if (data.cpu < 85) {
status.innerText = "Warning";
status.style.color = "#facc15";
} else {
status.innerText = "Critical";
status.style.color = "#ef4444";
}

document.getElementById("alerts").innerHTML = data.alerts.join("<br>");

addLog("CPU: " + data.cpu + "% | Memory: " + data.memory + "%");
}

function updateCharts(data) {
cpuChart.data.labels = data.history.cpu.map((_, i) => i);
memoryChart.data.labels = data.history.memory.map((_, i) => i);
diskChart.data.labels = data.history.disk.map((_, i) => i);

cpuChart.data.datasets[0].data = data.history.cpu;
memoryChart.data.datasets[0].data = data.history.memory;
diskChart.data.datasets[0].data = data.history.disk;

cpuChart.update();
memoryChart.update();
diskChart.update();
}

async function loadVisits() {
    const res = await fetch("/api/visits");
    const data = await res.json();
    animateValue("visits", 0, data.total_visits, 800);
}


async function fetchData() {
try {
const server = document.getElementById("serverSelect").value;
const res = await fetch(`/api/system_info?server=${server}`);
const data = await res.json();

updateUI(data);
updateCharts(data);

const shouldGlow = data.cpu > 80 || data.memory > 80 || data.disk > 80;

document.querySelectorAll(".fill").forEach(el => {
el.classList.toggle("glow", shouldGlow);
});

setColor("cpuText", data.cpu);
setColor("memoryText", data.memory);
setColor("diskText", data.disk);

document.getElementById("serverName").innerText = "Server: " + data.server;

} catch {
document.getElementById("status").innerText = "Offline";
}



}
setInterval(() => {
    fetchData();
    loadVisits();
}, 2000);
</script>

</body>
</html>

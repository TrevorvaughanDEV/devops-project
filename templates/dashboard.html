<!DOCTYPE html>
<html>
<head>
<title>Elite DevOps Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
margin: 0;
font-family: 'Inter', sans-serif;
background: #020617;
color: white;
}

.container {
padding: 30px;
}

.grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 25px;
}

.card {
background: rgba(255,255,255,0.04);
border-radius: 16px;
padding: 20px;
backdrop-filter: blur(12px);
}

.alerts {
margin-top: 20px;
color: #f87171;
font-weight: bold;
}

h1 {
margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
<h1>🚀 DevOps Intelligence Panel</h1>
<div>Status: <span id="status">Checking...</span></div>

<div class="grid">
<div class="card">
<h3>CPU</h3>
<canvas id="cpuChart"></canvas>
</div>

<div class="card">
<h3>Memory</h3>
<canvas id="memoryChart"></canvas>
</div>

<div class="card">
<h3>Disk</h3>
<canvas id="diskChart"></canvas>
</div>
</div>

<div class="alerts" id="alerts"></div>
</div>

<script>
function createChart(ctx, color) {
return new Chart(ctx, {
type: "line",
data: {
labels: [],
datasets: [{
data: [],
borderColor: color,
tension: 0.3
}]
},
options: {
plugins: { legend: { display: false }},
scales: {
x: { display: false },
y: { min: 0, max: 100 }
}
}
});
}

const cpuChart = createChart(document.getElementById("cpuChart"), "#22c55e");
const memoryChart = createChart(document.getElementById("memoryChart"), "#3b82f6");
const diskChart = createChart(document.getElementById("diskChart"), "#f59e0b");

async function loadData() {
try {
const res = await fetch("/api/system_info");
const data = await res.json();

document.getElementById("status").innerText = "Active";

cpuChart.data.datasets[0].data = data.history.cpu;
memoryChart.data.datasets[0].data = data.history.memory;
diskChart.data.datasets[0].data = data.history.disk;

cpuChart.update();
memoryChart.update();
diskChart.update();

document.getElementById("alerts").innerHTML = data.alerts.join("<br>");

} catch {
document.getElementById("status").innerText = "Offline";
}
}

setInterval(loadData, 2000);
loadData();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Monitoring Platform</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: 'Inter', sans-serif;
background: #020617;
color: #e2e8f0;
display: flex;
}

/* SIDEBAR */
.sidebar {
width: 240px;
height: 100vh;
background: rgba(255,255,255,0.03);
backdrop-filter: blur(12px);
padding: 25px;
border-right: 1px solid rgba(255,255,255,0.05);
}

.sidebar h2 { margin-bottom: 30px; }

.sidebar a {
display:block;
padding:12px;
margin-bottom:10px;
border-radius:8px;
color:#94a3b8;
text-decoration:none;
}

.sidebar a:hover {
background:#1e293b;
color:white;
}

/* MAIN */
.main {
flex:1;
padding:25px;
}

/* HEADER */
.header {
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1 { font-size:1.6rem; }

.logout {
background:#ef4444;
padding:8px 14px;
border-radius:8px;
color:white;
text-decoration:none;
}

/* GRID */
.grid {
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:20px;
margin-top:20px;
}

/* CARD */
.card {
background: rgba(255,255,255,0.04);
border-radius:14px;
padding:20px;
backdrop-filter: blur(12px);
box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* VALUE */
.value {
font-size:1.8rem;
margin-top:10px;
}

/* STATUS */
.status {
margin-top:10px;
font-weight:bold;
}

/* ALERTS */
.alerts {
margin-top:20px;
color:#f87171;
}

/* LOG PANEL */
.logs {
margin-top:20px;
max-height:200px;
overflow:auto;
font-family: monospace;
font-size:0.85rem;
background:#020617;
padding:10px;
border-radius:10px;
}

/* SERVER CARD */
.server {
margin-top:20px;
display:grid;
grid-template-columns: repeat(2,1fr);
gap:20px;
}

/* PROGRESS BAR */
.bar {
height:8px;
background:#1e293b;
border-radius:5px;
overflow:hidden;
margin-top:5px;
}

.fill {
height:100%;
background:#3b82f6;
width:0%;
}

/* FOOTER */
.footer {
margin-top:30px;
text-align:center;
color:#64748b;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🚀 Monitor</h2>
<a href="#">Dashboard</a>
<a href="#">Metrics</a>
<a href="#">Servers</a>
<a href="#">Logs</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h1>DevOps Monitoring</h1>
<a href="/logout" class="logout">Logout</a>
</div>

<div style="margin-top: 15px; display:flex; gap:15px; align-items:center;">
    <select id="serverSelect" style="background: rgba(255,255,255,0.04); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.05); padding: 8px; border-radius: 8px;">
        <option value="server1">Production</option>
        <option value="server2">Staging</option>
    </select>

    <h3 id="serverName">Server: Production</h3>
</div>

<div class="status">
Status: <span id="status">Checking...</span>
</div>

<!-- METRICS -->
<div class="grid">

<div class="card">
<h3>Visitors</h3>
<div class="value" id="visits">Loading...</div>
</div>


<div class="card">
<h3>CPU</h3>
<div class="value" id="cpuText">--%</div>
<div class="bar"><div id="cpuBar" class="fill"></div></div>
<canvas id="cpuChart"></canvas>
</div>

<div class="card">
<h3>Memory</h3>
<div class="value" id="memoryText">--%</div>
<div class="bar"><div id="memoryBar" class="fill"></div></div>
<canvas id="memoryChart"></canvas>
</div>

<div class="card">
<h3>Disk</h3>
<div class="value" id="diskText">--%</div>
<div class="bar"><div id="diskBar" class="fill"></div></div>
<canvas id="diskChart"></canvas>
</div>

</div>

<!-- SERVER INFO -->
<div class="server">

<div class="card">
<h3>Server Info</h3>
<p>Environment: Production</p>
<p>Region: EU-West</p>
<p>Version: v1.0</p>
</div>

<div class="card">
<h3>Alerts</h3>
<div id="alerts"></div>
</div>

</div>

<!-- LOGS -->
<div class="card logs" id="logs"></div>

<div class="footer">
DevOps Monitoring Platform • Live System
</div>

</div>

<script>
function createChart(ctx, color) {
return new Chart(ctx, {
type: "line",
data: {
labels: [],
datasets: [{
data: [],
borderColor: color,
tension: 0.3
}]
},
options: {
plugins: { legend: { display: false }},
scales: {
x: { display: false },
y: { min: 0, max: 100 }
}
}
});
}

const cpuChart = createChart(document.getElementById("cpuChart"), "#22c55e");
const memoryChart = createChart(document.getElementById("memoryChart"), "#3b82f6");
const diskChart = createChart(document.getElementById("diskChart"), "#f59e0b");

function addLog(msg) {
const log = document.getElementById("logs");
const time = new Date().toLocaleTimeString();
log.innerHTML = `[${time}] ${msg}<br>` + log.innerHTML;
}

function updateUI(data) {
document.getElementById("cpuText").innerText = data.cpu + "%";
document.getElementById("memoryText").innerText = data.memory + "%";
document.getElementById("diskText").innerText = data.disk + "%";

document.getElementById("cpuBar").style.width = data.cpu + "%";
document.getElementById("memoryBar").style.width = data.memory + "%";
document.getElementById("diskBar").style.width = data.disk + "%";

const status = document.getElementById("status");

if (data.cpu < 60) {
status.innerText = "Healthy";
status.style.color = "#22c55e";
} else if (data.cpu < 85) {
status.innerText = "Warning";
status.style.color = "#facc15";
} else {
status.innerText = "Critical";
status.style.color = "#ef4444";
}

document.getElementById("alerts").innerHTML = data.alerts.join("<br>");

addLog("CPU: " + data.cpu + "% | Memory: " + data.memory + "%");
}

function updateCharts(data) {
cpuChart.data.labels = data.history.cpu.map((_, i) => i);
memoryChart.data.labels = data.history.memory.map((_, i) => i);
diskChart.data.labels = data.history.disk.map((_, i) => i);

cpuChart.data.datasets[0].data = data.history.cpu;
memoryChart.data.datasets[0].data = data.history.memory;
diskChart.data.datasets[0].data = data.history.disk;

cpuChart.update();
memoryChart.update();
diskChart.update();
}

async function loadVisits() {
    const res = await fetch("/api/visits");
    const data = await res.json();
    document.getElementById("visits").innerText = data.total_visits;
}


async function fetchData() {
try {
const server = document.getElementById("serverSelect").value;
const res = await fetch(`/api/system_info?server=${server}`);
const data = await res.json();

updateUI(data);
updateCharts(data);

document.getElementById("serverName").innerText = "Server: " + data.server;

} catch {
document.getElementById("status").innerText = "Offline";
}
}

setInterval(() => {
    fetchData();
    loadVisits();
}, 2000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logs • DevOps Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: 'Inter', sans-serif;
background: #020617;
color: #e2e8f0;
display: flex;
}

.sidebar {
width: 260px;
height: 100vh;
background: rgba(255,255,255,0.02);
backdrop-filter: blur(12px);
padding: 30px 20px;
border-right: 1px solid rgba(255,255,255,0.08);
position: fixed;
left: 0;
overflow-y: auto;
}

.sidebar h2 {
margin-bottom: 35px;
font-size: 1.3rem;
background: linear-gradient(90deg, #22c55e, #3b82f6);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
}

.sidebar a {
display: flex;
align-items: center;
margin: 12px 0;
padding: 12px 15px;
transition: all 0.3s;
border-radius: 10px;
color: #94a3b8;
text-decoration: none;
font-size: 0.95rem;
}

.sidebar a:hover, .sidebar a.active {
background: rgba(59, 130, 246, 0.2);
color: #3b82f6;
transform: translateX(5px);
}

.main {
flex: 1;
margin-left: 260px;
padding: 30px;
overflow-y: auto;
max-height: 100vh;
}

.header {
backdrop-filter: blur(12px);
background: linear-gradient(135deg, rgba(15, 23, 42, 0.8), rgba(2, 6, 23, 0.8));
padding: 25px;
border-radius: 15px;
border: 1px solid rgba(255,255,255,0.1);
margin-bottom: 30px;
}

.header h1 {
font-size: 1.8rem;
}

.log-container {
background: linear-gradient(135deg, rgba(15, 23, 42, 0.5), rgba(2, 6, 23, 0.8));
padding: 20px;
border-radius: 15px;
border: 1px solid rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
}

.log-box {
background: rgba(0, 0, 0, 0.6);
padding: 20px;
height: 500px;
overflow-y: auto;
border-radius: 10px;
border: 1px solid rgba(255,255,255,0.05);
font-family: 'Monaco', monospace;
font-size: 0.85rem;
}

.log-box::-webkit-scrollbar {
width: 8px;
}

.log-box::-webkit-scrollbar-thumb {
background: rgba(255,255,255,0.2);
border-radius: 4px;
}

.log {
margin-bottom: 8px;
padding: 5px 0;
line-height: 1.6;
}

.log.info { color: #22c55e; }
.log.warn { color: #facc15; }
.log.error { color: #fca5a5; }
.log.debug { color: #94a3b8; }

.log-timestamp {
color: #64748b;
}

.footer {
text-align: center;
margin-top: 40px;
color: #64748b;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>🚀 Monitor</h2>
<a href="/dashboard">Dashboard</a>
<a href="/metrics">Metrics</a>
<a href="/servers">Servers</a>
<a href="/logs" class="active">Logs</a>
<a href="/projects">Projects</a>
<a href="/about">About</a>
</div>

<div class="main">
<div class="header">
<h1>📜 Live System Logs</h1>
<p style="color: #94a3b8; margin-top: 10px;">Real-time event monitoring and diagnostics</p>
</div>

<div class="log-container">
<div class="log-box" id="logs"></div>
</div>

<div class="footer">
DevOps Monitoring Platform • System Logs
</div>

</div>

<script>
function addLog(message, type) {
const logBox = document.getElementById("logs");
const time = new Date().toLocaleTimeString();

const log = document.createElement("div");
log.className = "log " + type;
log.innerHTML = `<span class="log-timestamp">[${time}]</span> ${message}`;

logBox.insertBefore(log, logBox.firstChild);

// Keep only last 100 logs
while (logBox.children.length > 100) {
logBox.removeChild(logBox.lastChild);
}
}

// Initialize with some logs
const initialMessages = [
'✓ Server started successfully',
'✓ Database connected',
'Dashboard loaded',
'Metrics sync complete',
'Background job execution started'
];

initialMessages.forEach((msg, i) => {
setTimeout(() => addLog(msg, 'info'), i * 300);
});

// Simulate live logs
setInterval(() => {
const types = ["info", "warn", "error", "debug"];
const msgs = [
"✓ CPU metrics updated",
"⚠ Memory usage at 78%",
"✗ Connection timeout detected",
"Data sync in progress",
"Cache invalidated",
"API response time: 245ms",
"Request queued",
"Health check passed"
];

const randomMsg = msgs[Math.floor(Math.random() * msgs.length)];
const randomType = types[Math.floor(Math.random() * types.length)];

addLog(randomMsg, randomType);
}, 2000);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
background: #0f172a;
color: white;
font-family: Arial;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.box {
background: #1e293b;
padding: 40px;
border-radius: 12px;
width: 300px;
}

input {
width: 100%;
padding: 10px;
margin: 10px 0;
border: none;
border-radius: 6px;
}

button {
width: 100%;
padding: 10px;
background: #22c55e;
border: none;
border-radius: 6px;
color: white;
cursor: pointer;
}

.error {
color: red;
font-size: 0.9rem;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
</div>

</body>
</html>

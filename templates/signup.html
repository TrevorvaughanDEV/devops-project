<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up • DevOps Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
margin: 0;
font-family: 'Inter', sans-serif;
background: radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.1), transparent),
            radial-gradient(circle at 80% 80%, rgba(34, 197, 94, 0.1), transparent),
            #020617;
color: white;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
padding: 20px;
}

.container {
width: 100%;
max-width: 450px;
}

.card {
background: rgba(255,255,255,0.05);
padding: 40px;
border-radius: 18px;
backdrop-filter: blur(12px);
border: 1px solid rgba(255,255,255,0.1);
box-shadow: 0 0 60px rgba(59, 130, 246, 0.15);
}

h2 {
text-align: center;
margin-bottom: 30px;
font-size: 1.8rem;
background: linear-gradient(90deg, #3b82f6, #22c55e);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
}

.input-group {
position: relative;
margin-bottom: 20px;
}

input {
width: 100%;
padding: 13px 15px;
border-radius: 10px;
border: 1px solid rgba(255,255,255,0.1);
outline: none;
background: rgba(15, 23, 42, 0.6);
color: white;
font-family: 'Inter', sans-serif;
font-size: 1rem;
transition: all 0.3s;
}

input::placeholder {
color: #64748b;
}

input:focus {
background: rgba(15, 23, 42, 0.8);
border-color: #3b82f6;
box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
}

button {
width: 100%;
padding: 13px;
background: linear-gradient(135deg, #22c55e, #3b82f6);
border: none;
border-radius: 10px;
color: white;
font-weight: 600;
font-size: 1rem;
cursor: pointer;
transition: all 0.3s;
margin-top: 15px;
}

button:hover {
transform: translateY(-2px);
box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
}

.error {
color: #fca5a5;
margin-bottom: 20px;
text-align: center;
padding: 12px;
background: rgba(239, 68, 68, 0.1);
border-radius: 8px;
border: 1px solid rgba(239, 68, 68, 0.3);
}

.footer {
margin-top: 20px;
text-align: center;
font-size: 0.95rem;
color: #94a3b8;
}

.footer a {
color: #3b82f6;
text-decoration: none;
font-weight: 500;
}

.footer a:hover {
text-decoration: underline;
}

.terms {
margin-top: 20px;
font-size: 0.85rem;
color: #64748b;
text-align: center;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Create Account</h2>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">

<div class="input-group">
<input type="text" name="username" placeholder="Create your username" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="Enter a strong password" required>
</div>

<button type="submit">Sign Up</button>

</form>

<div class="footer">
Already have an account? <a href="/login">Login here</a>
</div>

<div class="terms">
By signing up, you agree to our Terms of Service and Privacy Policy
</div>

</div>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
<style>
body {
background: #020617;
color: white;
font-family: Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box {
background:#1e293b;
padding:30px;
border-radius:10px;
width:300px;
}

input, button {
width:100%;
padding:10px;
margin:10px 0;
}

button {
background:#22c55e;
border:none;
color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>Create Account</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Sign Up</button>
</form>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metrics • DevOps Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: 'Inter', sans-serif;
background: #020617;
color: #e2e8f0;
display: flex;
}

.sidebar {
width: 260px;
height: 100vh;
background: rgba(255,255,255,0.02);
backdrop-filter: blur(12px);
padding: 30px 20px;
border-right: 1px solid rgba(255,255,255,0.08);
position: fixed;
left: 0;
overflow-y: auto;
}

.sidebar h2 {
margin-bottom: 35px;
font-size: 1.3rem;
background: linear-gradient(90deg, #22c55e, #3b82f6);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
}

.sidebar a {
display: flex;
align-items: center;
margin: 12px 0;
padding: 12px 15px;
transition: all 0.3s;
border-radius: 10px;
color: #94a3b8;
text-decoration: none;
font-size: 0.95rem;
}

.sidebar a:hover, .sidebar a.active {
background: rgba(59, 130, 246, 0.2);
color: #3b82f6;
transform: translateX(5px);
}

.main {
flex: 1;
margin-left: 260px;
padding: 30px;
overflow-y: auto;
max-height: 100vh;
}

.header {
backdrop-filter: blur(12px);
background: linear-gradient(135deg, rgba(15, 23, 42, 0.8), rgba(2, 6, 23, 0.8));
padding: 25px;
border-radius: 15px;
border: 1px solid rgba(255,255,255,0.1);
margin-bottom: 30px;
}

.header h1 {
font-size: 1.8rem;
}

.grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
gap: 25px;
margin-top: 25px;
}

.card {
background: linear-gradient(135deg, rgba(15, 23, 42, 0.5), rgba(2, 6, 23, 0.8));
padding: 25px;
border-radius: 15px;
border: 1px solid rgba(255,255,255,0.08);
overflow: hidden;
backdrop-filter: blur(10px);
transition: all 0.3s ease;
}

.card h3 {
margin-bottom: 20px;
color: #cbd5e1;
font-weight: 600;
}

.card:hover {
transform: translateY(-8px);
box-shadow: 0 15px 40px rgba(59, 130, 246, 0.15);
border-color: rgba(255,255,255,0.15);
}

canvas {
max-width: 100%;
}

.footer {
text-align: center;
margin-top: 40px;
color: #64748b;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>🚀 Monitor</h2>
<a href="/dashboard">Dashboard</a>
<a href="/metrics" class="active">Metrics</a>
<a href="/servers">Servers</a>
<a href="/logs">Logs</a>
<a href="/projects">Projects</a>
<a href="/about">About</a>
</div>

<div class="main">
<div class="header">
<h1>📊 Metrics Dashboard</h1>
<p style="color: #94a3b8; margin-top: 10px;">Real-time performance analytics and historical trends</p>
</div>

<div class="grid">

<div class="card">
<h3>CPU Usage Trend</h3>
<canvas id="cpuChart"></canvas>
</div>

<div class="card">
<h3>Memory Usage Trend</h3>
<canvas id="memoryChart"></canvas>
</div>

<div class="card">
<h3>Disk Usage Trend</h3>
<canvas id="diskChart"></canvas>
</div>

</div>

<div class="footer">
DevOps Monitoring Platform • Real-time Analytics 
</div>

</div>

<script>
function createChart(ctx, color, label) {
return new Chart(ctx, {
type: "line",
data: {
labels: Array.from({length: 20}, (_, i) => i),
datasets: [{
label: label,
data: Array.from({length: 20}, () => Math.random() * 100),
borderColor: color,
backgroundColor: color + '20',
tension: 0.4,
fill: true,
borderWidth: 3,
pointRadius: 4,
pointHoverRadius: 6,
pointBackgroundColor: color,
pointBorderColor: '#020617',
pointBorderWidth: 2
}]
},
options: {
responsive: true,
plugins: { 
legend: { 
display: true,
labels: { color: '#e2e8f0', font: { size: 12 } }
}
},
scales: {
y: { 
min: 0, 
max: 100,
ticks: { color: '#64748b' },
grid: { color: 'rgba(255,255,255,0.05)' }
},
x: { 
ticks: { color: '#64748b' },
grid: { color: 'rgba(255,255,255,0.05)' }
}
}
}
});
}

const cpuChart = createChart(document.getElementById("cpuChart"), "#22c55e", "CPU %");
const memoryChart = createChart(document.getElementById("memoryChart"), "#3b82f6", "Memory %");
const diskChart = createChart(document.getElementById("diskChart"), "#f59e0b", "Disk %");
</script>

</body>
</html>

upstream devops_monitor {
    server web:5000;
}

server {
    listen 80;
    server_name trevorvaughan.dev www.trevorvaughan.dev;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name trevorvaughan.dev www.trevorvaughan.dev;

    # SSL certificates (replace with your Let's Encrypt paths)
    ssl_certificate /etc/letsencrypt/live/trevorvaughan.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trevorvaughan.dev/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/devops_monitor_access.log;
    error_log /var/log/nginx/devops_monitor_error.log;

    # Client max body size
    client_max_body_size 10M;

    location / {
        proxy_pass http://devops_monitor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

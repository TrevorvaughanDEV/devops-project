version: '3.8'

services:
  web:
    build: .
    container_name: devops-monitor
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./metrics.db:/app/metrics.db
    restart: unless-stopped
    healthcheck:
      test: curl --fail http://localhost:5000/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
